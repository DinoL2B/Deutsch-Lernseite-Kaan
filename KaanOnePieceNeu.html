<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaans Abenteuer – Deutsch lernen</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E63946;
    --yellow: #FFD166;
    --blue: #118AB2;
    --green: #06D6A0;
    --dark: #1A1A2E;
    --darker: #0F0F1A;
    --card: #16213E;
    --card2: #1E2A4A;
    --text: #F0F0F0;
    --muted: #8899AA;
    --locked: #2A3A5A;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--darker);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── ANIMATED BACKGROUND ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(230,57,70,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(17,138,178,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(255,209,102,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    padding: 20px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid rgba(255,255,255,0.06);
    background: rgba(15,15,26,0.8);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
  }

  .logo {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--red);
    cursor: pointer;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .total-score {
    background: linear-gradient(135deg, var(--yellow), #FFA500);
    color: var(--dark);
    font-weight: 900;
    font-size: 1rem;
    padding: 8px 18px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ─── MAIN LAYOUT ─── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  /* ─── HERO / CHARACTER DISPLAY ─── */
  .hero {
    text-align: center;
    margin-bottom: 40px;
    padding: 40px 20px;
    background: linear-gradient(135deg, var(--card), var(--card2));
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '🏴‍☠️';
    position: absolute;
    font-size: 200px;
    opacity: 0.04;
    top: -40px;
    right: -20px;
    transform: rotate(15deg);
  }

  .current-char-label {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .current-char-name {
    font-family: 'Bangers', cursive;
    font-size: 3.5rem;
    letter-spacing: 3px;
    color: var(--yellow);
    text-shadow: 4px 4px 0 rgba(230,57,70,0.5);
    margin-bottom: 4px;
  }

  .current-char-rank {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 24px;
  }

  .char-avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    background: linear-gradient(135deg, var(--red), var(--blue));
    border: 4px solid var(--yellow);
    box-shadow: 0 0 30px rgba(255,209,102,0.3);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(255,209,102,0.3); }
    50% { box-shadow: 0 0 50px rgba(255,209,102,0.6); }
  }

  .progress-to-next {
    max-width: 400px;
    margin: 0 auto;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 50px;
    transition: width 1s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    border-radius: 0 50px 50px 0;
    animation: shimmer 2s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  /* ─── CHARACTER COLLECTION ─── */
  .section-title {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    letter-spacing: 2px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title span {
    color: var(--yellow);
  }

  .char-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 12px;
    margin-bottom: 50px;
  }

  .char-card {
    background: var(--card);
    border-radius: 16px;
    padding: 16px 8px;
    text-align: center;
    border: 2px solid transparent;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .char-card.unlocked {
    border-color: var(--yellow);
    background: linear-gradient(135deg, var(--card), #1E2A4A);
    cursor: pointer;
  }

  .char-card.unlocked:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(255,209,102,0.2);
  }

  .char-card.locked {
    opacity: 0.4;
    filter: grayscale(1);
  }

  .char-card .char-emoji {
    font-size: 2.2rem;
    display: block;
    margin-bottom: 6px;
  }

  .char-card .char-card-name {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .char-card .char-level {
    position: absolute;
    top: 6px;
    right: 6px;
    background: var(--red);
    color: white;
    font-size: 0.6rem;
    font-weight: 900;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .char-card.unlocked .char-level {
    background: var(--yellow);
    color: var(--dark);
  }

  .char-card .lock-icon {
    position: absolute;
    top: 6px;
    left: 6px;
    font-size: 0.7rem;
  }

  /* ─── QUIZ GRID ─── */
  .quiz-filters {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 20px;
    border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    border-color: var(--yellow);
    color: var(--yellow);
    background: rgba(255,209,102,0.08);
  }

  .quiz-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 50px;
  }

  .quiz-card {
    background: var(--card);
    border-radius: 20px;
    padding: 24px;
    border: 2px solid rgba(255,255,255,0.06);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 20px 20px 0 0;
  }

  .quiz-card.grammatik::before { background: linear-gradient(90deg, var(--red), var(--yellow)); }
  .quiz-card.rechtschreibung::before { background: linear-gradient(90deg, var(--blue), var(--green)); }
  .quiz-card.abschluss::before { background: linear-gradient(90deg, var(--yellow), var(--red)); }

  .quiz-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.15);
    box-shadow: var(--shadow);
  }

  .quiz-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .quiz-category {
    font-size: 0.7rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 50px;
  }

  .grammatik .quiz-category { background: rgba(230,57,70,0.2); color: var(--red); }
  .rechtschreibung .quiz-category { background: rgba(17,138,178,0.2); color: #4CC9F0; }
  .abschluss .quiz-category { background: rgba(255,209,102,0.2); color: var(--yellow); }

  .schwerpunkt-badge {
    font-size: 0.7rem;
    color: var(--yellow);
    font-weight: 800;
  }

  .quiz-title {
    font-size: 1.15rem;
    font-weight: 800;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .quiz-meta {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .quiz-meta-item {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Quiz Progress */
  .quiz-progress-row {
    margin-bottom: 14px;
  }

  .quiz-progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .quiz-progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 50px;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    border-radius: 50px;
    transition: width 0.8s ease;
  }

  .grammatik .quiz-progress-fill { background: linear-gradient(90deg, var(--red), var(--yellow)); }
  .rechtschreibung .quiz-progress-fill { background: linear-gradient(90deg, var(--blue), var(--green)); }
  .abschluss .quiz-progress-fill { background: linear-gradient(90deg, var(--yellow), var(--red)); }

  /* Attempts */
  .attempts-row {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    align-items: center;
  }

  .attempt-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .attempt-dot.passed { background: var(--green); }
  .attempt-dot.failed { background: var(--red); }
  .attempt-dot.needed { background: var(--yellow); border: 2px solid var(--yellow); background: transparent; }

  .attempts-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-left: 4px;
  }

  /* Quiz Button */
  .quiz-btn {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .grammatik .quiz-btn { background: linear-gradient(135deg, var(--red), #C1121F); color: white; }
  .rechtschreibung .quiz-btn { background: linear-gradient(135deg, var(--blue), #0A6A8A); color: white; }
  .abschluss .quiz-btn { background: linear-gradient(135deg, var(--yellow), #FFA500); color: var(--dark); }

  .quiz-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

  .quiz-char-reward {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 14px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .quiz-char-reward strong {
    color: var(--yellow);
  }

  /* ─── QUIZ MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 24px;
    padding: 36px;
    max-width: 600px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--yellow);
  }

  .modal-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.2); }

  /* Quiz Question Area */
  .question-counter {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .question-progress {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .question-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--blue));
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* Multiple Choice Options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .option-btn {
    padding: 14px 16px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--blue);
    background: rgba(17,138,178,0.1);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(6,214,160,0.15);
    color: var(--green);
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(230,57,70,0.15);
    color: var(--red);
  }

  /* Text Input */
  .text-input-area {
    margin-bottom: 24px;
  }

  .text-input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
  }

  .text-input:focus { border-color: var(--blue); }
  .text-input.correct { border-color: var(--green); background: rgba(6,214,160,0.08); }
  .text-input.wrong { border-color: var(--red); background: rgba(230,57,70,0.08); }

  /* Drag & Drop */
  .drag-area {
    margin-bottom: 24px;
  }

  .drag-sentence {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.8;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .drop-zone {
    display: inline-flex;
    min-width: 100px;
    height: 36px;
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0 10px;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.9rem;
    transition: all 0.2s;
    vertical-align: middle;
  }

  .drop-zone.over {
    border-color: var(--yellow);
    background: rgba(255,209,102,0.1);
  }

  .drop-zone.filled {
    border-style: solid;
    border-color: var(--blue);
    background: rgba(17,138,178,0.1);
    color: var(--text);
  }

  .drag-words {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    min-height: 60px;
  }

  .drag-word {
    padding: 8px 16px;
    background: var(--card2);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: grab;
    font-weight: 700;
    font-size: 0.95rem;
    transition: all 0.2s;
    user-select: none;
  }

  .drag-word:hover { border-color: var(--yellow); transform: translateY(-2px); }
  .drag-word.dragging { opacity: 0.4; }
  .drag-word.used { opacity: 0.2; pointer-events: none; }

  /* Feedback */
  .feedback-box {
    padding: 14px 18px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-weight: 700;
    display: none;
  }

  .feedback-box.correct {
    background: rgba(6,214,160,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    display: block;
  }

  .feedback-box.wrong {
    background: rgba(230,57,70,0.15);
    border: 1px solid var(--red);
    color: #FF6B6B;
    display: block;
  }

  /* Nav Buttons */
  .nav-btns {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--blue), #0A6A8A);
    color: white;
  }

  .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }

  .btn-success {
    background: linear-gradient(135deg, var(--green), #04A07A);
    color: var(--dark);
  }

  /* ─── RESULTS SCREEN ─── */
  .results-screen {
    text-align: center;
    padding: 20px 0;
  }

  .results-emoji {
    font-size: 5rem;
    margin-bottom: 16px;
    animation: bounce 1s ease infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .results-title {
    font-family: 'Bangers', cursive;
    font-size: 3rem;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .results-title.passed { color: var(--green); }
  .results-title.failed { color: var(--red); }

  .results-score {
    font-size: 1.2rem;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .results-score strong {
    color: var(--yellow);
    font-size: 2rem;
  }

  .char-unlocked {
    background: linear-gradient(135deg, rgba(255,209,102,0.1), rgba(230,57,70,0.1));
    border: 2px solid var(--yellow);
    border-radius: 20px;
    padding: 24px;
    margin: 20px 0;
    animation: glow 2s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(255,209,102,0.2); }
    50% { box-shadow: 0 0 40px rgba(255,209,102,0.5); }
  }

  .char-unlocked-emoji { font-size: 4rem; display: block; margin-bottom: 8px; }
  .char-unlocked-text { font-family: 'Bangers', cursive; font-size: 1.5rem; letter-spacing: 2px; color: var(--yellow); }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--card2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 20px;
    font-weight: 700;
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s ease;
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* ─── LOADING ─── */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.active { display: flex; }

  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    letter-spacing: 2px;
    color: var(--yellow);
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    .modal { padding: 24px 18px; }
    .current-char-name { font-size: 2.5rem; }
    .char-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Lade Aufgaben...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HEADER -->
<header>
  <div class="logo" onclick="scrollTo(0,0)">🏴‍☠️ KAANS QUEST</div>
  <div class="header-right">
    <div class="total-score">⭐ <span id="totalScore">0</span> Punkte</div>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- HERO -->
  <div class="hero">
    <div class="current-char-label">Aktueller Charakter</div>
    <div class="char-avatar" id="heroAvatar">⚓</div>
    <div class="current-char-name" id="heroName">Koby</div>
    <div class="current-char-rank" id="heroRank">Level 1 – Anfänger</div>
    <div class="progress-to-next">
      <div class="progress-label">
        <span>Fortschritt zum nächsten Charakter</span>
        <span id="progressText">0 / 1 Quiz bestanden</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="heroProgressFill" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- CHARACTER COLLECTION -->
  <div class="section-title">🎖️ <span>Charaktere</span></div>
  <div class="char-grid" id="charGrid"></div>

  <!-- QUIZ SECTION -->
  <div class="section-title">📚 <span>Quizze</span></div>
  <div class="quiz-filters">
    <button class="filter-btn active" onclick="filterQuiz('all', this)">Alle</button>
    <button class="filter-btn" onclick="filterQuiz('grammatik', this)">📖 Grammatik</button>
    <button class="filter-btn" onclick="filterQuiz('rechtschreibung', this)">✏️ Rechtschreibung</button>
    <button class="filter-btn" onclick="filterQuiz('abschluss', this)">🏆 Abschluss</button>
  </div>
  <div class="quiz-grid" id="quizGrid"></div>

</main>

<!-- QUIZ MODAL -->
<div class="modal-overlay" id="quizModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Quiz</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="quizContent"></div>
  </div>
</div>

<script>
// ─── CONFIG ───
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwP_TFXYAdkGXqKuW0XchmCApGAG0EY0chDEd3PBxKj1lx_xq5Ol681euINsDj2vKk-/exec";
const QUESTIONS_PER_QUIZ = 18;
const PASS_THRESHOLDS = [0.75, 0.80, 0.85]; // Versuch 1, 2, 3+

// ─── CHARACTERS ───
const CHARACTERS = [
  { name: "Koby", emoji: "⚓", rank: "Anfänger" },
  { name: "Usopp", emoji: "🎯", rank: "Schütze" },
  { name: "Nami", emoji: "🗺️", rank: "Navigatorin" },
  { name: "Chopper", emoji: "🦌", rank: "Arzt" },
  { name: "Brook", emoji: "🎸", rank: "Musiker" },
  { name: "Franky", emoji: "🔧", rank: "Schiffbauer" },
  { name: "Robin", emoji: "📖", rank: "Archäologin" },
  { name: "Sanji", emoji: "🍳", rank: "Koch" },
  { name: "Zoro", emoji: "⚔️", rank: "Schwertkämpfer" },
  { name: "Jinbe", emoji: "🐋", rank: "Steuermann" },
  { name: "Ace", emoji: "🔥", rank: "Feuerfaust" },
  { name: "Sabo", emoji: "🎩", rank: "Revolutionär" },
  { name: "Shanks", emoji: "🍶", rank: "Yonko" },
  { name: "Rayleigh", emoji: "⚡", rank: "Dunkler König" },
  { name: "Mihawk", emoji: "🦅", rank: "Weltbester Schwertkämpfer" },
  { name: "Whitebeard", emoji: "🌊", rank: "Stärkster Mann der Welt" },
  { name: "Kaido", emoji: "🐉", rank: "Stärkste Kreatur" },
  { name: "Akainu", emoji: "🌋", rank: "Flottenadmiral" },
  { name: "Dragon", emoji: "🌪️", rank: "Revolutionsführer" },
  { name: "Monkey D. Luffy", emoji: "🏴‍☠️", rank: "Piratenkönig" },
];

// ─── QUIZZES ───
const QUIZZES = [
  // GRAMMATIK – Schwerpunkte (⭐ = 2 passes needed)
  { id: "verben", title: "Verben & Zeitformen", category: "grammatik", schwerpunkt: true, charIndex: 1, passesNeeded: 2,
    topic: "Verben und Zeitformen (Präsens, Präteritum, Perfekt) für die 4. Klasse Deutsch" },
  { id: "satzglieder", title: "Satzglieder", category: "grammatik", schwerpunkt: true, charIndex: 2, passesNeeded: 2,
    topic: "Satzglieder (Subjekt, Prädikat, Objekt, Adverbiale) für die 4. Klasse Deutsch" },
  { id: "wortarten", title: "Wortarten bestimmen", category: "grammatik", schwerpunkt: true, charIndex: 3, passesNeeded: 2,
    topic: "Wortarten bestimmen (Nomen, Verb, Adjektiv, Pronomen, Artikel, Präposition) für die 4. Klasse Deutsch" },
  { id: "kasus", title: "Kasus", category: "grammatik", schwerpunkt: true, charIndex: 4, passesNeeded: 2,
    topic: "Kasus (Nominativ, Akkusativ, Dativ, Genitiv) für die 4. Klasse Deutsch" },
  { id: "konjunktionen", title: "Konjunktionen & Satzverbindungen", category: "grammatik", schwerpunkt: true, charIndex: 5, passesNeeded: 2,
    topic: "Konjunktionen und Satzverbindungen (und, aber, weil, dass, wenn, obwohl) für die 4. Klasse Deutsch" },
  // GRAMMATIK – Normal
  { id: "nomen", title: "Nomen & Artikel", category: "grammatik", schwerpunkt: false, charIndex: 6, passesNeeded: 1,
    topic: "Nomen und Artikel (bestimmte/unbestimmte Artikel, Genus) für die 4. Klasse Deutsch" },
  { id: "adjektive", title: "Adjektive & Steigerung", category: "grammatik", schwerpunkt: false, charIndex: 7, passesNeeded: 1,
    topic: "Adjektive und Steigerung (Positiv, Komparativ, Superlativ) für die 4. Klasse Deutsch" },
  { id: "satzarten", title: "Satzarten", category: "grammatik", schwerpunkt: false, charIndex: 8, passesNeeded: 1,
    topic: "Satzarten (Aussagesatz, Fragesatz, Ausrufesatz, Aufforderungssatz) für die 4. Klasse Deutsch" },
  { id: "pronomen", title: "Pronomen", category: "grammatik", schwerpunkt: false, charIndex: 9, passesNeeded: 1,
    topic: "Pronomen (Personalpronomen, Possessivpronomen) für die 4. Klasse Deutsch" },
  { id: "singular_plural", title: "Singular & Plural", category: "grammatik", schwerpunkt: false, charIndex: 10, passesNeeded: 1,
    topic: "Singular und Plural (Einzahl und Mehrzahl) für die 4. Klasse Deutsch" },
  // RECHTSCHREIBUNG
  { id: "recht_a", title: "Groß/Klein, Dehnung & Komma", category: "rechtschreibung", schwerpunkt: false, charIndex: 11, passesNeeded: 1,
    topic: "Groß- und Kleinschreibung, Dehnung (ie, h, aa, ee) und Kommasetzung in Aufzählungen für die 4. Klasse Deutsch" },
  { id: "recht_b", title: "Schärfung, s-Laute & Wortbausteine", category: "rechtschreibung", schwerpunkt: false, charIndex: 12, passesNeeded: 1,
    topic: "Schärfung (Doppelkonsonanten), s-Laute (s, ss, ß), Vor- und Nachsilben, Wörtliche Rede für die 4. Klasse Deutsch" },
  // ABSCHLUSS
  { id: "abschluss", title: "Alles kombiniert – Großes Finale", category: "abschluss", schwerpunkt: false, charIndex: 19, passesNeeded: 1,
    topic: "Alle Grammatik- und Rechtschreibthemen der 4. Klasse Deutsch kombiniert" },
];

// ─── STATE ───
let state = {
  progress: {}, // { quizId: { passes: 0, attempts: 0, bestScore: 0, unlockedChar: false } }
  questions: {}, // { quizId: [array of 50 questions] }
  totalScore: 0,
};

let currentQuiz = null;
let currentQuestions = [];
let currentQuestionIndex = 0;
let currentAnswers = [];
let currentScore = 0;

// ─── INIT ───
async function init() {
  showLoading("Lade Fortschritt...");
  await loadProgress();
  renderCharGrid();
  renderQuizGrid();
  updateHero();
  hideLoading();
}

// ─── PROGRESS ───
async function loadProgress() {
  try {
    const res = await fetch(SHEETS_URL);
    const json = await res.json();
    if (json.success && json.data) {
      Object.entries(json.data).forEach(([quizId, val]) => {
        state.progress[quizId] = {
          passes: parseInt(val.bestePunktzahl) || 0,
          attempts: parseInt(val.versuche) || 0,
          bestScore: parseFloat(val.bestePunktzahl) || 0,
          unlockedChar: val.bestanden === true || val.bestanden === "TRUE",
        };
      });
      // recalc total score
      state.totalScore = Object.values(state.progress).reduce((s, p) => s + (p.bestScore || 0), 0);
    }
  } catch(e) {
    // offline fallback
    const local = localStorage.getItem('kaan_progress');
    if (local) state.progress = JSON.parse(local);
  }
}

async function saveProgress(quizId, attempts, bestScore, passed, charName) {
  const payload = {
    action: "save",
    quiz: quizId,
    versuche: attempts,
    bestePunktzahl: bestScore,
    bestanden: passed,
    charakter: charName
  };
  // Save locally too
  localStorage.setItem('kaan_progress', JSON.stringify(state.progress));
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });
  } catch(e) { /* offline */ }
}

// ─── RENDER CHARACTERS ───
function renderCharGrid() {
  const grid = document.getElementById('charGrid');
  const unlockedCount = getUnlockedCount();
  grid.innerHTML = CHARACTERS.map((c, i) => {
    const unlocked = i < unlockedCount;
    return `<div class="char-card ${unlocked ? 'unlocked' : 'locked'}" title="${c.name} – ${c.rank}">
      <div class="char-level">${i+1}</div>
      ${!unlocked ? '<div class="lock-icon">🔒</div>' : ''}
      <span class="char-emoji">${c.emoji}</span>
      <div class="char-card-name">${c.name}</div>
    </div>`;
  }).join('');
}

function getUnlockedCount() {
  let count = 1; // Koby always unlocked
  QUIZZES.forEach(q => {
    const p = state.progress[q.id];
    if (p && p.passes >= q.passesNeeded) {
      count = Math.max(count, q.charIndex + 1);
    }
  });
  // Abschluss = Luffy (index 19)
  const abschluss = state.progress['abschluss'];
  if (abschluss && abschluss.passes >= 1) count = 20;
  return Math.min(count, 20);
}

// ─── RENDER QUIZ GRID ───
function renderQuizGrid(filter = 'all') {
  const grid = document.getElementById('quizGrid');
  const filtered = filter === 'all' ? QUIZZES : QUIZZES.filter(q => q.category === filter);
  grid.innerHTML = filtered.map(q => {
    const p = state.progress[q.id] || { passes: 0, attempts: 0, bestScore: 0 };
    const passesNeeded = q.passesNeeded;
    const passesDone = Math.min(p.passes || 0, passesNeeded);
    const pct = p.bestScore ? Math.round(p.bestScore) : 0;
    const char = CHARACTERS[q.charIndex];
    const threshold = getThreshold(p.attempts || 0);

    // Attempt dots
    let dots = '';
    for(let i = 0; i < passesNeeded; i++) {
      dots += `<div class="attempt-dot ${i < passesDone ? 'passed' : 'needed'}"></div>`;
    }

    const completed = passesDone >= passesNeeded;

    return `<div class="quiz-card ${q.category}" data-category="${q.category}">
      <div class="quiz-card-top">
        <span class="quiz-category">${q.category === 'grammatik' ? 'Grammatik' : q.category === 'rechtschreibung' ? 'Rechtschreibung' : '🏆 Abschluss'}</span>
        ${q.schwerpunkt ? '<span class="schwerpunkt-badge">⭐ Schwerpunkt</span>' : ''}
      </div>
      <div class="quiz-title">${q.title}</div>
      <div class="quiz-char-reward">
        <span>${char.emoji}</span>
        <span>Belohnung: <strong>${char.name}</strong></span>
        ${completed ? '<span style="color:var(--green);margin-left:auto">✓ Abgeschlossen</span>' : ''}
      </div>
      <div class="quiz-progress-row">
        <div class="quiz-progress-label">
          <span>Beste Punktzahl</span>
          <span>${pct}%</span>
        </div>
        <div class="quiz-progress-bar">
          <div class="quiz-progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="attempts-row">
        ${dots}
        <span class="attempts-label">${passesDone}/${passesNeeded} bestanden · Nächste Grenze: ${Math.round(threshold*100)}%</span>
      </div>
      <button class="quiz-btn" onclick="startQuiz('${q.id}')">
        ${completed ? '🔄 Wiederholen' : '▶ Quiz starten'}
      </button>
    </div>`;
  }).join('');
}

function filterQuiz(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuizGrid(cat);
}

function getThreshold(attempts) {
  if (attempts === 0) return PASS_THRESHOLDS[0];
  if (attempts === 1) return PASS_THRESHOLDS[1];
  return PASS_THRESHOLDS[2];
}

// ─── HERO UPDATE ───
function updateHero() {
  const unlocked = getUnlockedCount();
  const charIdx = Math.min(unlocked - 1, 19);
  const char = CHARACTERS[charIdx];
  document.getElementById('heroAvatar').textContent = char.emoji;
  document.getElementById('heroName').textContent = char.name;
  document.getElementById('heroRank').textContent = `Level ${charIdx+1} – ${char.rank}`;
  document.getElementById('totalScore').textContent = Math.round(state.totalScore);

  // Progress to next
  const next = charIdx + 1;
  if (next < 20) {
    const nextQuiz = QUIZZES.find(q => q.charIndex === next);
    if (nextQuiz) {
      const p = state.progress[nextQuiz.id] || {};
      const passes = Math.min(p.passes || 0, nextQuiz.passesNeeded);
      document.getElementById('progressText').textContent = `${passes} / ${nextQuiz.passesNeeded} Quiz bestanden`;
      document.getElementById('heroProgressFill').style.width = `${(passes/nextQuiz.passesNeeded)*100}%`;
    }
  } else {
    document.getElementById('progressText').textContent = '🏆 Alle Charaktere freigeschaltet!';
    document.getElementById('heroProgressFill').style.width = '100%';
  }
}

// ─── QUIZ START ───
async function startQuiz(quizId) {
  currentQuiz = QUIZZES.find(q => q.id === quizId);
  if (!currentQuiz) return;

  showLoading("Generiere Aufgaben mit KI...");

  // Check if we have cached questions
  if (!state.questions[quizId]) {
    await generateQuestions(quizId);
  }

  hideLoading();

  const allQ = state.questions[quizId] || [];
  if (allQ.length === 0) { showToast("❌ Fehler beim Laden der Fragen"); return; }

  // Pick 18 random
  const shuffled = [...allQ].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, Math.min(QUESTIONS_PER_QUIZ, shuffled.length));
  currentQuestionIndex = 0;
  currentScore = 0;
  currentAnswers = [];

  document.getElementById('modalTitle').textContent = currentQuiz.title;
  document.getElementById('quizModal').classList.add('active');
  renderQuestion();
}

// ─── GENERATE QUESTIONS VIA APPS SCRIPT ───
async function generateQuestions(quizId) {
  const quiz = QUIZZES.find(q => q.id === quizId);
  try {
    const res = await fetch(SHEETS_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "generate",
        topic: quiz.topic,
        quizId: quizId
      }),
    });
    const data = await res.json();
    if (data.success && data.questions) {
      state.questions[quizId] = data.questions;
      localStorage.setItem(`kaan_q_${quizId}`, JSON.stringify(data.questions));
    } else {
      throw new Error("Keine Fragen erhalten");
    }
  } catch(e) {
    const cached = localStorage.getItem(`kaan_q_${quizId}`);
    if (cached) state.questions[quizId] = JSON.parse(cached);
    else state.questions[quizId] = getFallbackQuestions(quizId);
  }
}

function getFallbackQuestions(quizId) {
  return [
    { type: "multiple_choice", question: "Welche Zeitform ist: 'Er spielt Fußball'?", options: ["Präsens", "Präteritum", "Perfekt", "Futur"], answer: "Präsens" },
    { type: "fill_blank", question: "Gestern ___ ich ins Kino gegangen.", answer: "bin" },
    { type: "drag_drop", question: "Bringe in die richtige Reihenfolge:", words: ["Hund", "Der", "bellt", "laut"], answer: "Der Hund bellt laut" },
  ];
}

// ─── RENDER QUESTION ───
function renderQuestion() {
  const q = currentQuestions[currentQuestionIndex];
  const total = currentQuestions.length;
  const pct = (currentQuestionIndex / total) * 100;

  let html = `
    <div class="question-counter">Frage ${currentQuestionIndex + 1} von ${total}</div>
    <div class="question-progress"><div class="question-progress-fill" style="width:${pct}%"></div></div>
    <div class="question-text">${q.question}</div>
  `;

  if (q.type === "multiple_choice") {
    html += `<div class="options-grid">
      ${q.options.map((opt, i) => `<button class="option-btn" onclick="checkMC(this, '${escapeStr(opt)}', '${escapeStr(q.answer)}')">${opt}</button>`).join('')}
    </div>`;
  } else if (q.type === "fill_blank") {
    html += `<div class="text-input-area">
      <input type="text" class="text-input" id="fillInput" placeholder="Antwort eingeben..." onkeydown="if(event.key==='Enter')checkFill()">
    </div>`;
  } else if (q.type === "drag_drop") {
    const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
    html += `<div class="drag-area">
      <div class="drag-sentence" id="dropZone">
        <span class="drop-zone" id="dzMain" ondragover="ev(event)" ondrop="dropWord(event)">Wörter hier ablegen</span>
      </div>
      <div class="drag-words" id="wordBank">
        ${shuffledWords.map(w => `<div class="drag-word" draggable="true" ondragstart="dragStart(event)" data-word="${w}">${w}</div>`).join('')}
      </div>
    </div>`;
  }

  html += `<div class="feedback-box" id="feedback"></div>`;

  if (q.type === "fill_blank") {
    html += `<div class="nav-btns"><button class="btn btn-primary" onclick="checkFill()">Prüfen ✓</button></div>`;
  } else if (q.type === "drag_drop") {
    html += `<div class="nav-btns"><button class="btn btn-primary" onclick="checkDrag()">Prüfen ✓</button></div>`;
  }

  document.getElementById('quizContent').innerHTML = html;

  if (q.type === "fill_blank") {
    document.getElementById('fillInput')?.focus();
  }
}

function escapeStr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ─── ANSWER CHECKING ───
function checkMC(btn, selected, correct) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const isCorrect = selected === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    btns.forEach(b => { if (b.textContent.trim() === correct) b.classList.add('correct'); });
  }
  showFeedback(isCorrect, correct);
  recordAnswer(isCorrect);
  setTimeout(() => nextQuestion(), 1400);
}

function checkFill() {
  const input = document.getElementById('fillInput');
  if (!input) return;
  const val = input.value.trim().toLowerCase();
  const q = currentQuestions[currentQuestionIndex];
  const isCorrect = val === q.answer.toLowerCase();
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  showFeedback(isCorrect, q.answer);
  recordAnswer(isCorrect);
  document.querySelector('.nav-btns').innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Weiter →</button>`;
}

// Drag & Drop
let draggedWord = null;
let droppedWords = [];

function dragStart(e) {
  draggedWord = e.target.dataset.word;
  e.target.classList.add('dragging');
  setTimeout(() => e.target.classList.remove('dragging'), 0);
}

function ev(e) { e.preventDefault(); }

function dropWord(e) {
  e.preventDefault();
  if (!draggedWord) return;
  droppedWords.push(draggedWord);
  const zone = document.getElementById('dzMain');
  zone.textContent = droppedWords.join(' ');
  zone.classList.add('filled');
  // Mark word as used
  document.querySelectorAll('.drag-word').forEach(w => {
    if (w.dataset.word === draggedWord && !w.classList.contains('used')) {
      w.classList.add('used');
      draggedWord = null;
    }
  });
}

function checkDrag() {
  const q = currentQuestions[currentQuestionIndex];
  const userAnswer = droppedWords.join(' ').toLowerCase().trim();
  const correct = q.answer.toLowerCase().trim();
  const isCorrect = userAnswer === correct;
  showFeedback(isCorrect, q.answer);
  recordAnswer(isCorrect);
  document.querySelector('.nav-btns').innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">Weiter →</button>`;
}

function showFeedback(isCorrect, correct) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  fb.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
  fb.textContent = isCorrect ? '✓ Richtig! Super gemacht!' : `✗ Nicht ganz. Richtig wäre: "${correct}"`;
}

function recordAnswer(isCorrect) {
  currentAnswers.push(isCorrect);
  if (isCorrect) currentScore++;
}

// ─── NEXT QUESTION / RESULTS ───
function nextQuestion() {
  currentQuestionIndex++;
  if (currentQuestionIndex < currentQuestions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

async function showResults() {
  const total = currentQuestions.length;
  const pct = currentScore / total;
  const p = state.progress[currentQuiz.id] || { passes: 0, attempts: 0, bestScore: 0 };
  const threshold = getThreshold(p.attempts);
  const passed = pct >= threshold;
  const scoreDisplay = Math.round(pct * 100);

  // Update progress
  const newAttempts = (p.attempts || 0) + 1;
  const newPasses = passed ? (p.passes || 0) + 1 : (p.passes || 0);
  const newBest = Math.max(p.bestScore || 0, scoreDisplay);
  const charName = CHARACTERS[currentQuiz.charIndex]?.name || '';
  const charUnlocked = newPasses >= currentQuiz.passesNeeded && !p.unlockedChar;

  state.progress[currentQuiz.id] = { passes: newPasses, attempts: newAttempts, bestScore: newBest, unlockedChar: newPasses >= currentQuiz.passesNeeded };
  state.totalScore += scoreDisplay;

  await saveProgress(currentQuiz.id, newAttempts, newBest, newPasses >= currentQuiz.passesNeeded, charName);

  const char = CHARACTERS[currentQuiz.charIndex];

  let html = `<div class="results-screen">
    <div class="results-emoji">${passed ? '🎉' : '💪'}</div>
    <div class="results-title ${passed ? 'passed' : 'failed'}">${passed ? 'Bestanden!' : 'Weiter üben!'}</div>
    <div class="results-score">Du hast <strong>${scoreDisplay}%</strong> erreicht<br>
    <small style="color:var(--muted);font-size:0.85rem">Mindestens ${Math.round(threshold*100)}% nötig</small></div>
    <div style="color:var(--muted);margin-bottom:16px">${currentScore} von ${total} Fragen richtig</div>`;

  if (charUnlocked) {
    html += `<div class="char-unlocked">
      <span class="char-unlocked-emoji">${char.emoji}</span>
      <div class="char-unlocked-text">🎊 ${char.name} freigeschaltet!</div>
    </div>`;
  } else if (passed) {
    html += `<div style="background:rgba(6,214,160,0.1);border:1px solid var(--green);border-radius:14px;padding:14px;margin:16px 0;color:var(--green);font-weight:700">
      ✓ ${newPasses}/${currentQuiz.passesNeeded} Bestehungen – ${newPasses >= currentQuiz.passesNeeded ? char.name+' freigeschaltet! '+char.emoji : 'Noch '+(currentQuiz.passesNeeded - newPasses)+' mal bestehen für '+char.name+' '+char.emoji}
    </div>`;
  }

  html += `<div class="nav-btns" style="justify-content:center;gap:12px;flex-wrap:wrap;margin-top:20px">
    <button class="btn btn-primary" onclick="startQuiz('${currentQuiz.id}')">🔄 Nochmal</button>
    <button class="btn btn-success" onclick="closeModal()">✓ Fertig</button>
  </div></div>`;

  document.getElementById('quizContent').innerHTML = html;

  renderCharGrid();
  renderQuizGrid();
  updateHero();
}

// ─── MODAL ───
function closeModal() {
  document.getElementById('quizModal').classList.remove('active');
  droppedWords = [];
}

// ─── LOADING ───
function showLoading(text = "Laden...") {
  document.querySelector('.loading-text').textContent = text;
  document.getElementById('loadingOverlay').classList.add('active');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('active');
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── START ───
init();
</script>
</body>
</html>
